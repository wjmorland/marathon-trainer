name: Sync Strava and deploy

on:
  schedule:
    - cron: "0 11 * * *"  # daily at 11:00 UTC
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "data/**"
      - "templates/**"
      - "static/**"
      - "scripts/**"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check scripts and plan data are valid
        run: |
          python -m py_compile scripts/*.py
          python -c "
          import sys, yaml
          from pathlib import Path
          for path in Path('data/plans').glob('*.yaml'):
              plan = yaml.safe_load(path.read_text())
              assert plan.get('id') and plan.get('weeks'), f'{path}: missing id or weeks'
          "

      - name: Sync Strava activities for each plan
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          for plan in data/plans/*.yaml; do
            plan_id=$(basename "$plan" .yaml)
            python scripts/sync_strava.py "$plan_id"
          done

      - name: Build site
        run: python scripts/build_site.py

      - name: Commit updated activity data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/activities
          git diff --staged --quiet || git commit -m "Sync Strava activity data"
          git push

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs

  deploy:
    needs: sync-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
